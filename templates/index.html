{% extends 'base.html' %}

{% block content %}
<h1>My Workouts</h1>

{% if workouts %}
<table>
    <thead>
        <tr>
            <th>Date</th>
            <th>Actions</th>
        </tr>
    </thead>
    <tbody>
        {% for workout in workouts %}
        <tr>
            <td>{{ workout.date }}</td>
            <td><a href="{{ url_for('view_workout', workout_id=workout.id) }}">View</a></td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% else %}
<p>No workouts logged yet.</p>
{% endif %}

<p><a href="{{ url_for('add_workout') }}">+ New Workout</a></p>
{% endblock %}

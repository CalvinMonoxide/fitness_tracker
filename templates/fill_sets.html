{% extends 'base.html' %}

{% block content %}
<h1>Fill in Sets: {{ exercise_name }}</h1>

<form method="POST">
    <table>
        <thead>
            <tr>
                <th>Set</th>
                <th>Weight (lbs)</th>
                <th>Reps</th>
                <th>Duration (sec)</th>
            </tr>
        </thead>
        <tbody>
            {% for set in sets %}
            <tr>
                <td>{{ set.set_number }}</td>
                <td>
                    <input type="hidden" name="set_id_{{ set.set_number }}" value="{{ set.id }}">
                    <input type="number" name="weight_{{ set.set_number }}" value="{{ set.weight or '' }}" placeholder="e.g., 135">
                </td>
                <td>
                    <input type="number" name="reps_{{ set.set_number }}" value="{{ set.reps or '' }}" placeholder="e.g., 10">
                </td>
                <td>
                    <input type="number" name="duration_{{ set.set_number }}" value="{{ set.duration or '' }}" placeholder="e.g., 60">
                </td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
    <button type="submit">Save Sets</button>
</form>

<p>
    <a href="{{ url_for('add_exercise', workout_id=workout_id) }}">← Add another exercise</a>
    |
    <a href="{{ url_for('view_workout', workout_id=workout_id) }}">Done →</a>
</p>
{% endblock %}

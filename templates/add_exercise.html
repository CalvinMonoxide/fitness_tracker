{% extends 'base.html' %}

{% block content %}
<h1>Add Exercise</h1>

<form method="POST">
    <label for="exercise">Exercise Name</label>
    <input type="text" id="exercise" name="exercise" placeholder="e.g., Bench Press" required>

    <label for="sets">Number of Sets</label>
    <input type="number" id="sets" name="sets" min="1" required>

    <button type="submit">Next: Fill in Sets</button>
</form>

<p><a href="{{ url_for('view_workout', workout_id=workout_id) }}">← Back to workout</a></p>
{% endblock %}

{% extends 'base.html' %}

{% block content %}
<h1>Log a Workout</h1>

<form method="POST">
    <label for="date">Date</label>
    <input type="date" id="date" name="date" required>

    <button type="submit">Save Workout</button>
</form>

<p><a href="{{ url_for('index') }}">← Back to workouts</a></p>
{% endblock %}
